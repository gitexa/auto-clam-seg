# Top-level Stage 1 config. Override on CLI like:
#   python train_gars_stage1.py model=gcn_3hop train.lr=5e-4 label=v3.0_lr5e4
defaults:
  - model: gatv2_3hop
  - train: stage1
  - _self_

stage: stage1
label: v3.0_gatv2_3hop
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments
use_local_ssd: auto    # auto | always | never

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gars, stage1]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${out_root}/multirun/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}_${hydra.job.override_dirname}
  job:
    chdir: false
