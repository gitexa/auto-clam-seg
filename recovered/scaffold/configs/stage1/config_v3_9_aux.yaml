defaults:
  - model: gatv2_5hop
  - train: stage1
  - _self_

stage: stage1
label: v3.9_aux_finetune_fold0
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments
use_local_ssd: auto

# v3.9 = v3.8 cascade Stage 1 fine-tuned with Strategy 1 aux loss.
# Initialise from v3.8 ckpt; aux labels from build_stage2_disagreement_labels.py.
train:
  lr: 1.0e-4                   # smaller LR for fine-tune (was 1e-3 in fresh train)
  weight_decay: 1.0e-4
  epochs: 20                   # fewer epochs since we're fine-tuning
  patience: 8
  pos_weight: 5.0              # unchanged
  upsample_factor: 4
  patch_size: 256
  k_folds: 5
  fold_idx: 0
  data_fraction: 1.0
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true

  # Strategy 1 knobs
  init_from_ckpt: /home/ubuntu/ahaas-persistent-std-tcga/experiments/gars_stage1_v3.8_gatv2_5hop_20260501_043445/best_checkpoint.pt
  aux_label_csv: /home/ubuntu/auto-clam-seg/recovered/scaffold/stage2_disagreement_labels_for_fold0.csv
  aux_loss_weight: 0.5         # combined: 1 × main_BCE + 0.5 × aux_BCE

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gars, stage1, aux_loss, strategy_1, finetune]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
