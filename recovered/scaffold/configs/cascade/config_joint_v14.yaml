defaults:
  - _self_

stage: cascade
label: v3.14_joint_v11lr_more_epochs
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

# v3.14: continue v3.11 best ckpt with same LR (1e-5) for 6 more epochs.
# Test: does v3.11 have room to keep descending if given more iterations?
# v3.13 with higher LR REGRESSED (epoch1 val 1.1255 > v3.11 best 1.1089).
# Conservative continuation might work.
stage1_ckpt: /home/ubuntu/ahaas-persistent-std-tcga/experiments/gars_cascade_v3.11_joint_v2_fold0_20260514_070326/stage1_extracted.pt
stage2_ckpt: /home/ubuntu/ahaas-persistent-std-tcga/experiments/gars_cascade_v3.11_joint_v2_fold0_20260514_070326/stage2_extracted.pt

fold_idx: 0
k_folds: 5

train:
  epochs: 6
  lr_stage1: 1.0e-5
  lr_stage2: 1.0e-5
  weight_decay: 1.0e-4
  threshold: 0.5
  max_windows_per_slide: 8
  val_max_windows_per_slide: 16
  class_weights: [1.0, 5.0, 3.0]
  gc_dice_weight: 1.0
  s1_pos_weight: 5.0
  stage1_bce_weight: 0.5

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: online
  tags: [v3.14, joint, cascade, e2e, conservative_cont]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
