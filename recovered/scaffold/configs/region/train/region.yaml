# @package train
# v3.37 RegionDecoder training. Frozen Stage 1 v3.8 + RGB+UNI+graph fusion decoder.
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 30
patience: 8
batch_size: 8                  # 768x768 + ResNet activations are heavier than v3.36
warmup_epochs: 3
gc_dice_weight: 1.0
class_weights: [1.0, 5.0, 3.0]
val_frac: 0.157
num_workers: 12                # post-precompute, dataset is GPU-free → can fork
prefetch_factor: 2
persistent_workers: true
