defaults:
  - _self_
stage: gncaf
label: v3.56_gncaf_transunet_unfrozen
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

model:
  hidden_size: 768
  n_classes: 3
  n_encoder_layers: 6
  n_heads: 12
  mlp_dim: 3072
  n_hops: 3
  n_fusion_layers: 1
  feature_dim: 1536
  dropout: 0.1

# v3.56 = v3.55 with R50 trunk UNFROZEN (freeze_cnn=false). Paper config
# says freeze_cnn=true but with bundled weights tuned for histology;
# our timm weights are ImageNet only — letting them adapt may close
# more of the IoU gap.  Stage 2 (the entire encoder + decoder) trains.
# LR stays at 5e-5 (proven stable for ViT fine-tune); separate group
# for the now-trainable R50 at slightly lower LR.
train:
  lr: 5.0e-5
  weight_decay: 1.0e-4
  epochs: 60
  patience: 12
  warmup_epochs: 5
  class_weights: [1.0, 5.0, 3.0]
  max_pos_per_slide: 16
  bg_per_pos: 1.0
  num_workers: 12
  freeze_cnn: false       # ← v3.56 change
  amp: true
  grad_clip: 0.5
  load_imagenet_r50: true
  load_imagenet_vit: true
  augment: false
  dice_loss_weight: 0.5
  include_negative_slides: true
  neg_slide_targets: 8

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gncaf, transunet, unfrozen, paper-repro]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
