defaults:
  - _self_
stage: gncaf
label: v3.64_dual_sigmoid_tls_pw1
seed: 42
k_folds: 5
fold_idx: 0
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

# v3.64 — v3.63 worked for GC (Dice 0.434→0.669) but TLS regressed
# (TLS-FP 95%→98%). Hypothesis: tls_pos_weight=5 + 2×TLS Dice over-fires.
# v3.64 drops tls_pos_weight to 1.0 (matching seg_v2.0's recipe — no upweight)
# while keeping gc_pos_weight=30 + gc_dice=5 (which fixed GC). This isolates
# the upweight as the cause of TLS over-firing on tissue-only patches.
model:
  hidden_size: 768
  n_classes: 3
  n_encoder_layers: 12
  n_heads: 12
  mlp_dim: 3072
  n_hops: 3
  n_fusion_layers: 1
  feature_dim: 1536
  dropout: 0.1
  head_mode: dual_sigmoid

train:
  lr: 5.0e-5
  weight_decay: 1.0e-4
  epochs: 60
  patience: 12
  warmup_epochs: 5
  class_weights: [1.0, 1.0, 1.0]
  dice_loss_weight: 2.0
  gc_dice_weight: 5.0
  tls_pos_weight: 1.0    # ← v3.64 change (was 5.0 in v3.63)
  gc_pos_weight: 30.0
  max_pos_per_slide: 12
  bg_per_pos: 1.0
  num_workers: 12
  freeze_cnn: false
  amp: true
  grad_clip: 0.5
  load_imagenet_r50: true
  load_imagenet_vit: true
  augment: true
  include_negative_slides: true
  neg_slide_targets: 8

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gncaf, transunet, vit12, dual_sigmoid, v3.64, tls_pw1]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
