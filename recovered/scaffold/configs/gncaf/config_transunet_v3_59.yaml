defaults:
  - _self_
stage: gncaf
label: v3.59_gcunet_transunet_vit12_aug
seed: 42
k_folds: 5         # patient-stratified split; deterministic given seed
fold_idx: 0        # 0..4 — which fold is validation (rest = train)
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

# v3.59 = v3.58 + GCUNet-faithful GCN aggregation (paper Eq. 3):
# concat all hops [x⁽⁰⁾, x⁽¹⁾, …, x⁽ᴷ⁾] then MLP. Replaces v3.58's
# iterative residual GCN. All other hyperparams identical to v3.58
# so the comparison isolates the GCN aggregation rule.
model:
  model_class: gcunet      # ← v3.59 change (was implicit "gncaf")
  hidden_size: 768
  n_classes: 3
  n_encoder_layers: 12
  n_heads: 12
  mlp_dim: 3072
  n_hops: 3
  n_fusion_layers: 1
  feature_dim: 1536
  dropout: 0.1

train:
  lr: 5.0e-5
  weight_decay: 1.0e-4
  epochs: 60
  patience: 12
  warmup_epochs: 5
  class_weights: [1.0, 5.0, 3.0]
  max_pos_per_slide: 12
  bg_per_pos: 1.0
  num_workers: 12
  freeze_cnn: false
  amp: true
  grad_clip: 0.5
  load_imagenet_r50: true
  load_imagenet_vit: true
  augment: true
  dice_loss_weight: 0.5
  include_negative_slides: true
  neg_slide_targets: 8

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gcunet, transunet, vit12, augmented, paper-repro, eq3]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
