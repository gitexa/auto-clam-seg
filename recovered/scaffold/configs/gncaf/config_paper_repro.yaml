defaults:
  - _self_
stage: gncaf
label: v3.40_gncaf_paper_repro
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

model:
  dim: 384                  # paper ViT-S width
  encoder_layers: 12        # paper config
  encoder_heads: 6
  gcn_hops: 3
  fusion_heads: 8
  dropout: 0.1

train:
  lr: 1.0e-4                # paper-style (vs v3.35's 5e-5)
  weight_decay: 5.0e-4
  epochs: 60                # 2× v3.35
  patience: 12
  warmup_epochs: 5
  class_weights: [1.0, 5.0, 3.0]
  gc_dice_weight: 1.0
  max_pos_per_slide: 12
  bg_per_pos: 1.0
  num_workers: 8
  amp: true

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gncaf, full, paper-repro, benchmark]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
