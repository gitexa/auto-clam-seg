defaults:
  - _self_
stage: gncaf
label: v3.35_gncaf_full_12layer
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

model:
  dim: 384
  encoder_layers: 12      # paper config (vs v3.21's 6)
  encoder_heads: 6
  gcn_hops: 3
  fusion_heads: 8
  dropout: 0.1

train:
  lr: 5.0e-5
  weight_decay: 1.0e-4
  epochs: 30              # vs v3.21's 15
  patience: 8
  warmup_epochs: 2
  class_weights: [1.0, 5.0, 3.0]   # v3.4b winning recipe
  max_pos_per_slide: 12
  bg_per_pos: 1.0
  num_workers: 8
  amp: true

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, gncaf, full, benchmark]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
