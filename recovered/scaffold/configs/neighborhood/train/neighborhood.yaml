# @package train
# v3.36 NeighborhoodPixelDecoder training. Recipe matches v3.4b champion
# Stage 2 (class_weights=[1,5,3], gc_dice_weight=1) so the v3.36 ablation
# isolates the neighborhood-vs-patch architectural change.
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 50
patience: 10
batch_size: 16              # vs 128 per-patch (768x768 activations are 9x larger)
warmup_epochs: 3
gc_dice_weight: 1.0
class_weights: [1.0, 5.0, 3.0]
val_frac: 0.157
num_workers: 16
prefetch_factor: 2
persistent_workers: true
