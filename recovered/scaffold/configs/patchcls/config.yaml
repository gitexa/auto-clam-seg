defaults:
  - _self_
stage: patchcls
label: v3.22_patchcls_gatv2_5hop
seed: 42
out_root: /home/ubuntu/ahaas-persistent-std-tcga/experiments

model:
  hidden_dim: 256
  n_hops: 5         # match v3.8 winning config
  gat_heads: 4
  dropout: 0.1

train:
  lr: 5.0e-4
  weight_decay: 1.0e-4
  epochs: 30
  patience: 8
  class_weights: [1.0, 5.0, 3.0]    # match v3.4b winning config
  min_tls_pixels: 4096

wandb:
  enabled: true
  project: tls-pixel-seg
  entity: null
  mode: ${oc.env:WANDB_MODE,online}
  tags: [v3, patchcls, no-upsample]

hydra:
  run:
    dir: ${out_root}/gars_${stage}_${label}_${now:%Y%m%d_%H%M%S}
  job:
    chdir: false
